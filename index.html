<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CallWorkAmma - Fast Dialing Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="callicon.png">
</head>
<body>
    <div class="container">
        <header class="main-header">
            <img src="callicon.png" alt="caller logo" class="logo-img">
            <div id="header-stats" class="header-stats hidden">
                Total: <span id="total-count">0</span> • Remaining: <span id="remaining-count">0</span>
            </div>
            <button id="clear-all" class="btn btn-danger hidden">Clear All</button>
        </header>

        <section id="input-container" class="input-section">
            <textarea id="number-input" placeholder="Paste your excel numbers here..."></textarea>
            <div class="button-group">
                <button id="add-numbers" class="btn btn-primary">Add Numbers</button>
            </div>
        </section>

        <section class="list-section">
            <ul id="number-list">
                <!-- Numbers will be injected here -->
            </ul>
        </section>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('Service Worker failed:', err));
            });
        }
    </script>
</body>
</html>
